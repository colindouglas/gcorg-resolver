name: Integration tests

on:
  workflow_run:
    workflows: ["Terraform apply (dev)", "Terraform apply (prod)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "API base URL to test"
        required: false
        default: ""
  schedule:
    - cron: "30 6 * * *"  # 30 min after the daily data update

jobs:
  integration-test:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine API base URL
        id: url
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.base_url }}" ]]; then
              echo "base_url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
              echo "IS_PROD=false" >> "$GITHUB_ENV"
            else
              echo "base_url=${{ vars.API_BASE_URL_PROD }}" >> "$GITHUB_OUTPUT"
              echo "IS_PROD=true" >> "$GITHUB_ENV"
            fi
          elif [[ "${{ github.event.workflow_run.name }}" == "Terraform apply (dev)" ]]; then
            echo "base_url=${{ vars.API_BASE_URL_DEV }}" >> "$GITHUB_OUTPUT"
            echo "IS_PROD=false" >> "$GITHUB_ENV"
          else
            echo "base_url=${{ vars.API_BASE_URL_PROD }}" >> "$GITHUB_OUTPUT"
            echo "IS_PROD=true" >> "$GITHUB_ENV"
          fi

      - name: Run integration tests
        continue-on-error: true
        env:
          BASE_URL: ${{ steps.url.outputs.base_url }}
        run: |
          set -o pipefail
          bash tests/integration_api.sh 2>&1 | tee /tmp/integration_api.log
          status=${PIPESTATUS[0]}

          if [[ "$status" -eq 0 ]]; then
            echo "TEST_FAILED=false" >> $GITHUB_ENV
          else
            echo "TEST_FAILED=true" >> $GITHUB_ENV
            echo "Integration script failed with exit code $status"
          fi

          exit "$status"

      - name: Slack message if integration testing fails in prod
        if: ${{ env.TEST_FAILED == 'true' && env.IS_PROD == 'true' }}
        run: |
          json='{"blocks":[{"type":"section","text":{"type":"mrkdwn","text":":rotating_light: Integration tests failed in the <https://github.com/cds-snc/gcorg-resolver|GC Organization Name Resolution API>. Please investigate or reach out to <@U07QX02BQS2> for help."}}]}'
          curl -X POST -H 'Content-type: application/json' --data "$json" ${{ secrets.SRE_BOT_WEBHOOK_ALERT }}

      - name: Fail job if integration tests failed
        if: ${{ env.TEST_FAILED == 'true' }}
        run: |
          echo "Integration tests failed"
          exit 1