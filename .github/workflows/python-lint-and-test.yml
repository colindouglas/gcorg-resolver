# Python CI — lint with ruff and run pytest via uv

name: Python Lint and Test

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "data/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "data/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python-ci.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run tests
        run: uv run --frozen pytest
