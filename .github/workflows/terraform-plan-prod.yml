name: Terraform plan (prod)

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - "src/**"
      - "data/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/terraform-plan-prod.yml"
      - ".github/workflows/terraform-apply-prod.yml"

concurrency:
  group: terraform-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ca-central-1
  TF_INPUT: "false"
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build Lambda zip
        run: bash infra/build_lambda.sh

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/gcorg-resolver-plan-prod
          role-session-name: TFPlanProd
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform init
        run: terraform -chdir=infra/env/prod init

      - name: Terraform plan
        id: plan
        run: terraform -chdir=infra/env/prod plan -no-color -input=false
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- tf-plan-prod-comment -->';
            const maxLen = 60000;

            let output = `${{ steps.plan.outputs.stdout }}`;
            if (output.length > maxLen) {
              output = output.slice(0, maxLen) + '\n\n... (truncated)';
            }

            const body = [
              marker,
              `### Terraform plan (prod) — \`${{ steps.plan.outcome }}\``,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```hcl',
              output,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
